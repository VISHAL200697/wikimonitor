name: Trigger Toolforge Build Beta

on:
  workflow_dispatch:

jobs:
  trigger-build:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Trigger Build on Toolforge
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: 22
          script_stop: true
          script: |
            become wikimonitor-beta bash -c "
              toolforge build start https://github.com/${{ github.repository }} --ref ${{ github.ref_name }};
              toolforge webservice buildservice restart"
