name: Trigger Toolforge Build Beta

on:
  workflow_dispatch:

jobs:
  trigger-build:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Trigger Build on Toolforge
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: 22
          script_stop: true
          script: |
            become wikimonitor-beta bash -c '
              set -e

              REPO="https://github.com/${{ github.repository }}"
              REF="${{ github.ref_name }}"

              dologmsg "[DEPLOY] Starting deployment | repo=$REPO | ref=$REF"

              toolforge build start "$REPO" --ref "$REF"

              dologmsg "[DEPLOY] Build triggered successfully | ref=$REF"

              restart

              dologmsg "[DEPLOY] Restarting buildservice | ref=$REF"

              toolforge webservice buildservice restart

              dologmsg "[DEPLOY] Deployment completed successfully | ref=$REF"
            '
