name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: production

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build application
        run: mvn -B -ntp clean package

      - name: Upload JAR to Toolforge
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          port: 22
          key: ${{ secrets.KEY }}
          source: "target/wikimonitor.jar"
          target: "/data/project/wikimonitor"
          strip_components: 1
              
      - name: Restart Toolforge webservice
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          port: 22
          key: ${{ secrets.KEY }}
          request_pty: true
          script_stop: true
          script: |
            become wikimonitor bash -c "
              toolforge webservice stop;
              toolforge webservice jdk17 start /data/project/wikimonitor/runapp"
