name: Trigger Toolforge Build

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for deployment (optional)'
        required: false
        default: ''
jobs:
  trigger-build:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Trigger Build on Toolforge
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: 22
          script_stop: true
          script: |
            become wikimonitor bash << 'EOF'
            set -e
            
            REPO="https://github.com/${{ github.repository }}"
            REF="${{ github.ref_name }}"
            REASON="${{ github.event.inputs.reason }}"
            SCRIPT_URL="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/deploy-toolforge.sh"
            
            echo "--> Downloading deployment script from branch: $REF"
            wget -q -O deploy-toolforge.sh "$SCRIPT_URL"
            
            chmod +x deploy-toolforge.sh
            
            echo "--> Triggering build in background..."
            nohup ./deploy-toolforge.sh "$REPO" "$REF" "$REASON" > deployment.log 2>&1 &
            
            sleep 2
            echo "--> Done! Build is running on Toolforge. Check deployment.log for status."
            EOF

