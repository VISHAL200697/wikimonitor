server.port=8000
spring.application.name=wikimonitor
app.version=@project.version@
# MySQL Configuration
spring.datasource.url=jdbc:mysql://${TOOL_TOOLSDB_HOST}:3306/${TOOL_TOOLSDB_DATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${TOOL_TOOLSDB_USER}
spring.datasource.password=${TOOL_TOOLSDB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.url=${spring.datasource.url}
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.fail-on-missing-locations=true
spring.flyway.locations=classpath:db/migration

# Cache static resources for 30 minutes
spring.web.resources.cache.cachecontrol.max-age=30m
spring.web.resources.cache.cachecontrol.cache-public=true
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/css/**,/js/**,/images/**,/lib/**
