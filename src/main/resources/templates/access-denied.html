<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Access Denied - WikiMonitor</title>
    <script>
        (() => {
            try {
                const t = localStorage.getItem('wikimonitor-theme');
                if (t === 'light' || t === 'dark') {
                    document.documentElement.setAttribute('data-theme', t);
                }
            } catch (e) {
            }
        })();
    </script>
    <link th:href="@{/lib/bootstrap-5.3.2/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/lib/bootstrap-icons-1.13.1/css/bootstrap-icons.min.css}" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link rel="icon" th:href="@{/images/icon.svg}" type="image/svg+xml">
</head>

<body class="d-flex align-items-center justify-content-center vh-100 font-monospace" style="background: var(--bg-color); color: var(--text-color);">
    <div style="position: fixed; top: 1rem; right: 1rem;">
        <button class="btn btn-outline-secondary btn-sm" data-theme-toggle="true" aria-label="Toggle dark mode" aria-pressed="false" title="Switch theme">
            <i class="bi bi-moon-stars-fill"></i>
        </button>
    </div>
    <div class="text-center">
        <h1 class="display-1 fw-bold text-danger mb-4">403</h1>
        <h2 class="h2 fw-semibold mb-4">Access Denied</h2>
        <p class="text-secondary mb-5 lead">You do not have permission to view this page or your account is pending
            approval.
        </p>
        <div>
            <form class="d-inline" method="post" th:action="@{/logout}">
                <button class="btn btn-secondary btn-lg fw-bold px-4" type="submit">
                    Logout
                </button>
            </form>
        </div>
    </div>
    <script th:src="@{/js/theme.js}"></script>
    <script th:src="@{/lib/bootstrap-5.3.2/js/bootstrap.bundle.min.js}"></script>
</body>

</html>
