<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - WikiMonitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        slate: {
                            850: '#1e293b',
                            900: '#0f172a',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-900 text-gray-100 min-h-screen font-sans">

<nav class="bg-slate-800 border-b border-slate-700">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
            <div class="flex items-center">
                <a class="text-xl font-bold text-emerald-400" href="/">WikiMonitor</a>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-4">
                        <a class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium"
                           href="/">Map</a>
                        <a class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium"
                           href="/wiki">Documentation</a>
                        <a class="bg-slate-900 text-white px-3 py-2 rounded-md text-sm font-medium"
                           href="/admin">Admin</a>
                    </div>
                </div>
            </div>
            <div>
                <form method="post" th:action="@{/logout}">
                    <button class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium"
                            type="submit">Logout
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="max-w-7xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
    <header class="mb-8">
        <h1 class="text-3xl font-bold text-white">User Management</h1>
        <p class="mt-2 text-gray-400">Manage user access and permissions for WikiMonitor.</p>
    </header>

    <div class="mb-6 flex justify-between items-center bg-slate-800 p-4 rounded-lg border border-slate-700">
        <form class="flex items-center space-x-2" method="get" th:action="@{/admin}">
            <input class="bg-slate-700 border-none text-white rounded px-3 py-2 w-64 focus:ring-2 focus:ring-emerald-500" name="search" placeholder="Search users..." th:value="${search}"
                   type="text">
            <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md transition-colors"
                    type="submit">Search
            </button>
        </form>

        <div class="flex items-center space-x-3">
            <span class="text-gray-300 font-medium">Auto-approve new users:</span>
            <form id="autoApproveForm" method="post" th:action="@{/admin/settings/auto-approve}">
                <input id="autoApproveValue" name="enabled" th:value="${autoApproveEnabled}" type="hidden">
                <label class="relative inline-flex items-center cursor-pointer">
                    <input class="sr-only peer" onchange="document.getElementById('autoApproveValue').value = this.checked; document.getElementById('autoApproveForm').submit()"
                           th:checked="${autoApproveEnabled}"
                           type="checkbox">
                    <div
                            class="w-11 h-6 bg-gray-700 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-emerald-800 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-600">
                    </div>
                </label>
            </form>
        </div>
    </div>

    <div class="bg-slate-800 shadow overflow-hidden sm:rounded-lg border border-slate-700">
        <table class="min-w-full divide-y divide-slate-700">
            <thead class="bg-slate-700">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider"
                    scope="col">ID
                </th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider"
                    scope="col">
                    Username
                </th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider"
                    scope="col">
                    Central ID
                </th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider"
                    scope="col">
                    Status
                </th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider"
                    scope="col">Role
                </th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider"
                    scope="col">
                    Actions
                </th>
            </tr>
            </thead>
            <tbody class="bg-slate-800 divide-y divide-slate-700">
            <tr th:each="user : ${users.content}">
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-400" th:text="${user.id}">1</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-white"
                    th:text="${user.username}">User1
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-400" th:text="${user.centralId}">12345
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-900 text-green-200"
                                  th:if="${user.approved}">Approved</span>
                    <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-red-900 text-red-200"
                          th:unless="${user.approved}">Pending</span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-300" th:text="${user.role}">USER</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium space-x-2">
                    <form class="inline" method="post" th:action="@{/admin/users/{id}/approve(id=${user.id})}">
                        <input name="approved" th:value="${!user.approved}" type="hidden"/>
                        <button th:class="${user.approved} ? 'text-red-400 hover:text-red-300' : 'text-green-400 hover:text-green-300'"
                                th:text="${user.approved} ? 'Revoke' : 'Approve'"
                                type="submit">
                            Approve
                        </button>
                    </form>
                    <span class="text-slate-600">|</span>
                    <form class="inline" method="post" th:action="@{/admin/users/{id}/role(id=${user.id})}">
                        <input name="role" th:value="${user.role == 'ADMIN' ? 'USER' : 'ADMIN'}"
                               type="hidden"/>
                        <button class="text-blue-400 hover:text-blue-300" th:text="${user.role == 'ADMIN' ? 'Make User' : 'Make Admin'}"
                                type="submit">
                            Make Admin
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="flex justify-center mt-6" th:if="${users.totalPages > 1}">
        <nav aria-label="Pagination" class="relative z-0 inline-flex rounded-md shadow-sm -space-x-px">
            <a class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-slate-700 bg-slate-800 text-sm font-medium text-gray-400 hover:bg-slate-700"
               th:classappend="${users.first} ? 'pointer-events-none opacity-50' : ''"
               th:href="@{/admin(page=${users.number - 1}, search=${search})}">
                Previous
            </a>

            <span
                    class="relative inline-flex items-center px-4 py-2 border border-slate-700 bg-slate-800 text-sm font-medium text-gray-300">
                    Page <span class="mx-1" th:text="${users.number + 1}">1</span> of <span
                    class="mx-1" th:text="${users.totalPages}">10</span>
                </span>

            <a class="relative inline-flex items-center px-2 py-2 rounded-r-md border border-slate-700 bg-slate-800 text-sm font-medium text-gray-400 hover:bg-slate-700"
               th:classappend="${users.last} ? 'pointer-events-none opacity-50' : ''"
               th:href="@{/admin(page=${users.number + 1}, search=${search})}">
                Next
            </a>
        </nav>
    </div>
</div>

</body>

</html>
