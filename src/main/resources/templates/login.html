<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Wikimedia Monitor</title>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            padding: 2rem;
            border-radius: 1rem;
            background: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            text-align: center;
        }
        .login-btn {
            background-color: #3366cc; /* Wikimedia Blue */
            color: white;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            transition: all 0.2s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .login-btn:hover {
            background-color: #2a4b8d;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(51, 102, 204, 0.3);
            color: white;
            text-decoration: none;
        }
        .logo-icon {
            font-size: 3rem;
            color: #333;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="mb-4">
        <i class="bi bi-activity logo-icon"></i>
        <h2 class="fw-bold mb-1">WikiMonitor</h2>
        <p class="text-muted">Real-time collaboration monitoring</p>
    </div>

    <div class="alert alert-danger" role="alert" th:if="${param.error}">
        Login failed. Please try again.
    </div>
    <div class="alert alert-success" role="alert" th:if="${param.logout}">
        You have been logged out.
    </div>

    <a class="btn login-btn" href="/auth/wikimedia">
        <i class="bi bi-wikipedia"></i>
        Login with Wikimedia
    </a>

    <div class="mt-4 text-muted small">
        By logging in, you agree to our terms of service.
    </div>
</div>

</body>
</html>
