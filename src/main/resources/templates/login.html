<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - WikiMonitor</title>
    <link href="/lib/bootstrap-5.3.2/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="icon" href="/images/icon.svg" type="image/svg+xml">
    <style>
        body {
            background-color: #f8f9fa;
            /* Light Gray */
            color: #212529;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background-color: #ffffff;
            /* White */
            border: 1px solid #dee2e6;
            /* Gray 300 */
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            max-width: 400px;
            width: 100%;
        }

        .login-header {
            text-align: center;
            padding: 2rem 1rem 1rem;
        }

        .login-body {
            padding: 1rem 2rem 2rem;
        }
    </style>
</head>

<body>

    <div class="container d-flex justify-content-center">
        <div class="login-card p-4">
            <div class="login-header mb-3">
                <img src="/images/icon.svg" alt="WikiMonitor Logo" width="64" height="64" class="mb-3">
                <h3 class="fw-bold text-dark">WikiMonitor</h3>
                <p class="text-secondary small">Real-time vandalism monitoring</p>
            </div>

            <div class="login-body">
                <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <div>Authentication failed. Please try again.</div>
                </div>

                <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <div>You have been logged out.</div>
                </div>

                <div class="d-grid gap-2">
                    <a href="/auth/wikimedia"
                        class="btn btn-primary btn-lg fw-semibold d-flex align-items-center justify-content-center gap-2">
                        <i class="bi bi-wikipedia"></i>
                        Login with MediaWiki
                    </a>
                </div>


            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>

</body>

</html>
