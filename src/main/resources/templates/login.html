<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - WikiMonitor</title>
    <script>
        (() => {
            try {
                const t = localStorage.getItem('wikimonitor-theme');
                if (t === 'light' || t === 'dark') {
                    document.documentElement.setAttribute('data-theme', t);
                }
            } catch (e) {
            }
        })();
    </script>
    <link th:href="@{/lib/bootstrap-5.3.2/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/lib/bootstrap-icons-1.13.1/css/bootstrap-icons.min.css}" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link rel="icon" th:href="@{/images/icon.svg}" type="image/svg+xml">
    <style>
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            max-width: 400px;
            width: 100%;
        }

        .login-header {
            text-align: center;
            padding: 2rem 1rem 1rem;
        }

        .login-body {
            padding: 1rem 2rem 2rem;
        }

        .theme-toggle-wrap {
            position: fixed;
            top: 1rem;
            right: 1rem;
        }
    </style>
</head>

<body>

    <div class="theme-toggle-wrap">
        <button class="btn btn-outline-secondary btn-sm" data-theme-toggle="true" aria-label="Toggle dark mode" aria-pressed="false" title="Switch theme">
            <i class="bi bi-moon-stars-fill"></i>
        </button>
    </div>

    <div class="container d-flex justify-content-center">
        <div class="login-card p-4">
            <div class="login-header mb-3">
                <img th:src="@{/images/icon.svg}" alt="WikiMonitor Logo" width="128" height="128" class="mb-3">
                <h3 class="fw-bold text-dark">WikiMonitor</h3>
                <p class="text-secondary small">Real-time vandalism monitoring</p>
            </div>

            <div class="login-body">
                <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <div th:switch="${param.error[0]}">
                        <span th:case="'no_rollback_rights'">
                            You do not have rollback rights on any wiki.
                        </span>
                        <span th:case="*">
                            Authentication failed. Please try again.
                        </span>
                    </div>
                </div>

                <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <div>You have been logged out.</div>
                </div>

                <div class="d-grid gap-2">
                    <a href="/auth/wikimedia"
                        class="btn btn-primary btn-lg fw-semibold d-flex align-items-center justify-content-center gap-2">
                        <i class="bi bi-wikipedia"></i>
                        Login with MediaWiki
                    </a>
                </div>


            </div>
        </div>
    </div>

    <script th:src="@{/js/theme.js}"></script>
    <script th:src="@{/lib/bootstrap-5.3.2/js/bootstrap.bundle.min.js}"></script>

</body>

</html>
